<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack Daily Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <main class="app-shell">
    <section class="dashboard-card">
      <h1>NutriTrack Daily Nutrition Dashboard</h1>
      <p class="subtitle">Track your macros against daily targets and simulate an order completion.</p>
      <div id="dashboard-summary" class="dashboard-summary"></div>
      <div id="alert-banner" class="alert-banner" hidden></div>
      <div id="dashboard" class="progress-grid"></div>

      <section class="history-section">
        <div class="history-header">
          <div>
            <h2>Last 7 days</h2>
            <p class="subtitle">See weekly calorie trends and track consistency.</p>
          </div>
          <div id="history-stats" class="history-stats"></div>
        </div>
        <div class="history-chart-card">
          <canvas id="calorie-chart" height="180"></canvas>
        </div>
      </section>

      <div id="toast-container" class="toast-container"></div>
    </section>

    <section class="simulator-card">
      <h2>Simulate order completion</h2>
      <form id="order-form" class="order-form">
        <label>
          User ID
          <input type="number" id="user_id" value="1" min="1" required />
        </label>
        <label>
          Calories
          <input type="number" id="calories" value="450" min="0" required />
        </label>
        <label>
          Protein (g)
          <input type="number" id="protein_g" value="30" min="0" required />
        </label>
        <label>
          Carbs (g)
          <input type="number" id="carbs_g" value="55" min="0" required />
        </label>
        <label>
          Fats (g)
          <input type="number" id="fats_g" value="12" min="0" required />
        </label>
        <button type="submit">Simulate order</button>
        <button type="button" id="reset-button" class="reset-button">Reset today's log</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
